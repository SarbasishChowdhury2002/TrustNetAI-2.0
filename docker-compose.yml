services:

  postgres:
    image: postgres:15
    container_name: trustnet_postgres
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: trustnet_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:latest
    container_name: trustnet_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://trustnet_kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@trustnet_kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1