services:

  postgres:
    image: postgres:15
    container_name: trustnet_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: trustnet_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres